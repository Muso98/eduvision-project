version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eduvision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             daphne -b 0.0.0.0 -p 8000 eduvision.asgi:application"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=eduvision.settings
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A eduvision worker -l info
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=eduvision.settings
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
