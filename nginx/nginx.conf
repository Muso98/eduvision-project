worker_processes 1;

events {
    worker_connections 512;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Allow large video uploads (up to 1GB)
    client_max_body_size 1G;

    # Timeouts for long-running AI video analysis (30 minutes)
    proxy_read_timeout 1800;
    proxy_connect_timeout 60;
    proxy_send_timeout 1800;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name eduvision.com.uz www.eduvision.com.uz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name eduvision.com.uz www.eduvision.com.uz;

        ssl_certificate /etc/nginx/ssl/live/eduvision.com.uz/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/eduvision.com.uz/privkey.pem;

        # SSL optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Static files (Django collectstatic)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Media files (uploaded videos/images)
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Django REST API & Admin
        location ~ ^/(api|admin) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500M;
        }

        # Django Channels (WebSockets)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_read_timeout 86400;
        }

        # Frontend Next.js (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
