worker_processes 1;

events {
    worker_connections 512;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Allow large video uploads (up to 500MB)
    client_max_body_size 500M;

    # Timeouts for long-running AI video analysis
    proxy_read_timeout 600;
    proxy_connect_timeout 60;
    proxy_send_timeout 600;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Static files (Django collectstatic)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Media files (uploaded videos/images)
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Django REST API & Admin
        location ~ ^/(api|admin) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Allow large uploads through
            client_max_body_size 500M;
        }

        # Django Channels (WebSockets)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_read_timeout 86400;
        }

        # Frontend Next.js (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
